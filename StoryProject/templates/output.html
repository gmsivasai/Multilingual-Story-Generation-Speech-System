<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
<div class="card p-4 shadow">

<h3>Generated Story</h3>

<textarea class="form-control mb-3" rows="10">{{ story }}</textarea>

<audio controls class="w-100">
    <source src="/static/story.mp3">
</audio>

<br><br>
<style>
body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    color: white;
}

/* Card styling */
.card {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    color: white;
    border: none;
}

/* Inputs */
.form-control, select {
    background: rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border: none;
}

/* Placeholder color */
::placeholder {
    color: #ddd !important;
}

/* Buttons */
.btn {
    border-radius: 10px;
}
</style>

<a href="/generate/" class="btn btn-secondary">Back</a>

</div>
</div>

</body>
</html>
