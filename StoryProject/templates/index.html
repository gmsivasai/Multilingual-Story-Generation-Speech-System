
<html>
<head>
<title>Story Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    color: white;
}

/* Card styling */
.card {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    color: white;
    border: none;
}

/* Inputs */
.form-control, select {
    background: rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border: none;
}

/* Placeholder color */
::placeholder {
    color: #ddd !important;
}

/* Buttons */
.btn {
    border-radius: 10px;
}
</style>

</head>

<body>

<div class="container text-center mt-5">

    <h1 class="text-white">MULTILINGUAL STORY GENERATION & SPEECH SYSTEM</h1>
    <p class="text-white">Generate multilingual stories with speech</p>

    <div class="mt-4">
        <a href="/login/" class="btn btn-light m-2">Login</a>
        <a href="/register/" class="btn btn-dark m-2">Register</a>
    </div>

</div>

</body>
</html>
