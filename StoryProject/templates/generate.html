<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    color: white;
}

/* Card styling */
.card {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    color: white;
    border: none;
}

/* Inputs */
.form-control, select {
    background: rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border: none;
}

/* Placeholder color */
::placeholder {
    color: #ddd !important;
}

/* Buttons */
.btn {
    border-radius: 10px;
}
</style>


<script>
function showLoader() {
    document.getElementById("formDiv").style.display = "none";
    document.getElementById("loader").style.display = "block";
}
</script>

</head>

<body class="bg-light">

<div class="container mt-5">

<!-- FORM -->
<div id="formDiv" class="card p-4 shadow col-md-6 mx-auto">

<h3 class="text-center">Generate Story</h3>

<form method="POST" onsubmit="showLoader()">
{% csrf_token %}

<input class="form-control mb-3" name="prompt" placeholder="Enter story idea">

<select class="form-control mb-3" name="language">
<option value="en">English</option>
<option value="hi">Hindi</option>
<option value="te">Telugu</option>
</select>

<button class="btn btn-primary w-100">Generate</button>

</form>

</div>

<!-- LOADER -->
<div id="loader" class="text-center mt-5">

<div class="spinner-border text-primary" style="width: 4rem; height: 4rem;"></div>

<h4 class="mt-3">Generating your story... ⏳</h4>

</div>

</div>

</body>
</html>
