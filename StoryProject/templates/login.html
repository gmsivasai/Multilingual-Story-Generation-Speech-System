<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
<style>
body {
    background: linear-gradient(135deg, #141e30, #243b55);
    min-height: 100vh;
    color: white;
}

/* Card styling */
.card {
    background: rgba(255, 255, 255, 0.1) !important;
    backdrop-filter: blur(10px);
    border-radius: 15px;
    color: white;
    border: none;
}

/* Inputs */
.form-control, select {
    background: rgba(255, 255, 255, 0.2) !important;
    color: white !important;
    border: none;
}

/* Placeholder color */
::placeholder {
    color: #ddd !important;
}

/* Buttons */
.btn {
    border-radius: 10px;
}
</style>

<div class="container mt-5">
<div class="card p-4 shadow col-md-4 mx-auto">

<h3 class="text-center">Login</h3>

<form method="POST" action="/login_action/">
{% csrf_token %}

<input class="form-control mb-3" name="t1" placeholder="Username">
<input class="form-control mb-3" type="password" name="t2" placeholder="Password">

<button class="btn btn-primary w-100">Login</button>

</form>

<p class="text-danger text-center mt-2">{{ data }}</p>

</div>
</div>

</body>
</html>
